version: "2"

run:
  build-tags: []

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - gosec
    - gocritic
    - ineffassign
    - misspell
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 15
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
      - path: (ble|bluetooth)\.go
        linters:
          - unused
