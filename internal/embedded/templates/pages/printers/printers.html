{{ define "printers" }}
<div class="printers-view">
    <h1>Drukarki</h1>

    {{ if .Printers }}
    <ul class="container-list">
        {{ range .Printers }}
        <li>
            <div class="printer-card">
                <span class="name">{{ .Name }}</span>
                <span class="desc">{{ .Encoder }}/{{ .Model }} via {{ .Transport }} @ {{ .Address }}</span>
                <div id="printer-status-{{ .ID }}" class="printer-status">
                    <span class="status-muted">Loading...</span>
                </div>
                <button onclick="connectPrinter('{{ .ID }}')" class="button" style="font-size:0.8rem;padding:0.4rem 0.8rem">Connect</button>
                <button onclick="disconnectPrinter('{{ .ID }}')" class="button secondary" style="font-size:0.8rem;padding:0.4rem 0.8rem">Disconnect</button>
                <button hx-delete="/ui/actions/printers/{{ .ID }}" hx-target="#content" hx-confirm="Usunąć drukarkę?" class="danger">Usuń</button>
            </div>
        </li>
        {{ end }}
    </ul>
    {{ else }}
    <p class="empty">Brak skonfigurowanych drukarek</p>
    {{ end }}

    <section class="ble-scan">
        <button onclick="scanBLE()" class="button">🔍 Skanuj Bluetooth</button>
        <div id="ble-results"></div>
    </section>

    <section class="actions">
        <details>
            <summary>+ Dodaj drukarkę</summary>
            <form hx-post="/ui/actions/printers" hx-target="#content">
                <div class="form-group">
                    <label for="name">Nazwa</label>
                    <input type="text" id="name" name="name" required placeholder="np. Brother kuchnia">
                </div>
                <div class="form-group">
                    <label for="encoder">Encoder</label>
                    <select id="encoder" name="encoder">
                        {{ range .Encoders }}
                        <option value="{{ .Name }}">{{ .Name }}</option>
                        {{ end }}
                    </select>
                </div>
                <div class="form-group">
                    <label for="model">Model</label>
                    <select id="model" name="model">
                        {{ range .Encoders }}{{ range .Models }}
                        <option value="{{ .ID }}">{{ .Name }}</option>
                        {{ end }}{{ end }}
                    </select>
                </div>
                <div class="form-group">
                    <label for="transport">Transport</label>
                    <select id="transport" name="transport">
                        <option value="usb">USB</option>
                        <option value="serial">Serial/Bluetooth</option>
                        <option value="ble">Bluetooth (BLE)</option>
                        <option value="remote">Remote QLX</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="address">Adres</label>
                    <input type="text" id="address" name="address" required placeholder="/dev/usb/lp0">
                </div>
                <button type="submit">Dodaj</button>
            </form>
        </details>
    </section>
</div>
<script>
function scanBLE() {
    var container = document.getElementById('ble-results');
    container.textContent = '';
    var loading = document.createElement('p');
    loading.textContent = 'Skanowanie... (5s)';
    container.appendChild(loading);

    fetch('/api/bluetooth/scan')
        .then(function(r) {
            if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || r.statusText); });
            return r.json();
        })
        .then(function(devices) {
            container.textContent = '';
            if (!devices || devices.length === 0) {
                var empty = document.createElement('p');
                empty.className = 'empty';
                empty.textContent = 'Nie znaleziono drukarek';
                container.appendChild(empty);
                return;
            }
            var ul = document.createElement('ul');
            ul.className = 'container-list';
            devices.forEach(function(d) {
                var li = document.createElement('li');
                var a = document.createElement('a');
                a.href = '#';
                a.className = 'container-item';
                a.onclick = function(e) {
                    e.preventDefault();
                    fillPrinter(d.name, d.address);
                };
                var nameSpan = document.createElement('span');
                nameSpan.className = 'name';
                nameSpan.textContent = d.name;
                var descSpan = document.createElement('span');
                descSpan.className = 'desc';
                descSpan.textContent = 'RSSI: ' + d.rssi + ' dBm | ' + d.address;
                a.appendChild(nameSpan);
                a.appendChild(descSpan);
                li.appendChild(a);
                ul.appendChild(li);
            });
            container.appendChild(ul);
        })
        .catch(function(err) {
            container.textContent = '';
            var errP = document.createElement('p');
            errP.className = 'empty';
            errP.textContent = 'Błąd: ' + err.message;
            container.appendChild(errP);
        });
}

function connectPrinter(id) {
    fetch('/api/printers/' + id + '/connect', {method: 'POST'})
        .then(function(r) { return r.json(); })
        .then(function(d) { if (d.error) showToast(d.error, true); else showToast('Connected', false); })
        .catch(function(e) { showToast('Error: ' + e, true); });
}

function disconnectPrinter(id) {
    fetch('/api/printers/' + id + '/disconnect', {method: 'POST'})
        .then(function(r) { return r.json(); })
        .then(function(d) { showToast('Disconnected', false); })
        .catch(function(e) { showToast('Error: ' + e, true); });
}

function fillPrinter(name, address) {
    var nameInput = document.getElementById('name');
    var encoderSelect = document.getElementById('encoder');
    var transportSelect = document.getElementById('transport');
    var addressInput = document.getElementById('address');
    if (nameInput) nameInput.value = name;
    if (encoderSelect) encoderSelect.value = 'niimbot';
    if (transportSelect) transportSelect.value = 'ble';
    if (addressInput) addressInput.value = address;
    var details = document.querySelector('details');
    if (details) details.open = true;
}
</script>
{{ end }}
