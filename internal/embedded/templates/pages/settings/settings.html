{{ define "settings" }}
<h1>{{.T "settings.title"}}</h1>

<div class="settings-section">
    <h2>{{.T "settings.language"}}</h2>
    <div class="lang-options">
        <button class="lang-option{{if eq .Lang "pl"}} lang-active{{end}}"
                hx-post="/set-lang" hx-vals='{"lang":"pl"}'
                hx-swap="none" hx-on::after-request="window.location.reload()">
            🇵🇱 Polski
        </button>
        <button class="lang-option{{if eq .Lang "en"}} lang-active{{end}}"
                hx-post="/set-lang" hx-vals='{"lang":"en"}'
                hx-swap="none" hx-on::after-request="window.location.reload()">
            🇬🇧 English
        </button>
    </div>
</div>

<div class="settings-section">
    <h2>{{.T "settings.data"}}</h2>
    <div class="actions">
        <button class="btn btn-secondary" onclick="qlx.openExportDialog({})">{{.T "settings.export"}}</button>
    </div>
</div>
{{ end }}
