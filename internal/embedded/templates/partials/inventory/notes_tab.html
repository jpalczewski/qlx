{{ define "notes-tab" }}
<div class="notes-tab">
    {{/* Quick-entry form: posts to /notes, prepends new card */}}
    <form class="note-quick-entry"
          hx-post="/notes"
          hx-target=".note-list"
          hx-swap="afterbegin"
          hx-on::after-request="if(event.detail.successful){ this.reset(); }">
        <input type="hidden" name="{{ .ParentType }}_id" value="{{ .ParentID }}">
        <input class="note-quick-entry-title"
               type="text"
               name="title"
               placeholder="Note title…"
               autocomplete="off"
               required>
        <textarea class="note-quick-entry-content"
                  name="content"
                  placeholder="Content (optional)…"></textarea>
        <div class="note-quick-entry-footer">
            <button type="submit" class="btn btn-primary btn-small">Add note</button>
        </div>
    </form>

    {{/* Note list */}}
    <ul class="note-list">
        {{ range .Notes }}
        {{ template "note-card" dict "Data" . }}
        {{ end }}
    </ul>
</div>
{{ end }}
