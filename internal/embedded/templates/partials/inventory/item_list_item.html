{{ define "item-list-item" }}
<li draggable="true" data-id="{{ .Data.ID }}" data-type="item" class="flash">
    <input type="checkbox" class="bulk-select" data-id="{{ .Data.ID }}" data-type="item">
    <a href="/ui/items/{{ .Data.ID }}" hx-get="/ui/items/{{ .Data.ID }}" hx-target="#content" class="item-item">
        <span class="name">📋 {{ .Data.Name }}</span>
    </a>
    {{ if gt .Data.Quantity 1 }}<span class="badge">x{{ .Data.Quantity }}</span>{{ end }}
</li>
{{ end }}
