{{ define "breadcrumb" }}
<nav class="breadcrumb">
    <a href="/ui" hx-get="/ui" hx-target="#content" data-drop-id="" data-drop-type="container">🏠 Główna</a>
    {{ range .Path }}
    <span class="sep">→</span>
    <a href="/ui/containers/{{ .ID }}" hx-get="/ui/containers/{{ .ID }}" hx-target="#content" data-drop-id="{{ .ID }}" data-drop-type="container">{{ .Name }}</a>
    {{ end }}
    {{ with .Current }}
    <span class="sep">→</span>
    <span class="current">{{ . }}</span>
    {{ end }}
</nav>
{{ end }}
