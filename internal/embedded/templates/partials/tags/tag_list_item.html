{{ define "tag-list-item" }}
<a href="/tags/{{ .Data.ID }}" hx-get="/tags/{{ .Data.ID }}" hx-target="#content"
   class="tag-pill flash"{{ if .Data.Color }} style="background-color: {{ paletteHex .Data.Color }}22; border-color: {{ paletteHex .Data.Color }}"{{ end }}>
    {{ if .Data.Icon }}<span class="entity-icon">{{ icon .Data.Icon }}</span>{{ end }}
    <span class="tag-pill-name">{{ .Data.Name }}</span>
</a>
{{ end }}
