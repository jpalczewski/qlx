name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          additional_permissions: |
            actions: read
          prompt: |
            Review pull request #${{ github.event.number }} in ${{ github.repository }}.

            Check the code changes for:
            - Bugs and correctness issues
            - Security vulnerabilities (XSS, injection, etc.)
            - Code quality and maintainability
            - Adherence to project conventions (see CLAUDE.md)

            Also check CI status for this PR using:
              gh run list --repo ${{ github.repository }} --branch ${{ github.head_ref }} --limit 5

            If any CI run failed, include relevant log excerpts:
              gh run view <run-id> --repo ${{ github.repository }} --log-failed

            Be concise. Only report real issues. If the code looks good, say so briefly.
