name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          PR_NUMBER: ${{ github.event.number }}
          REPO: ${{ github.repository }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review pull request #${{ github.event.number }} in ${{ github.repository }}.

            Check the code changes for:
            - Bugs and correctness issues
            - Security vulnerabilities (XSS, injection, etc.)
            - Code quality and maintainability
            - Adherence to project conventions (see CLAUDE.md)

            Post your review as a comment using:
            gh pr comment ${{ github.event.number }} --repo ${{ github.repository }} --body "..."

            Be concise. Only report real issues. If the code looks good, say so briefly.
